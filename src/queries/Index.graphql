#import "./FontDetail.fragment.graphql"
#import "./FontCollectionCSS.fragment.graphql"

query Index {
  viewer {
    settings {
      title
    }
    firstCollection: fontCollections(onlyRoots: true, first: 1) {
      edges {
        node {
          ...FontDetail
          slug {
            name
          }
        }
      }
    }
    fontCollections(onlyRoots: true, first: 99) {
      edges {
        node {
          id
          name
          collectionType
          url
          isNew
          opticalAdjustment
          slug { name }
          ...FontCollectionCSS
        }
      }
    }
  }
}
