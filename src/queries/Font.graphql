fragment FontDetailCollection on FontCollection {
  id
  name
  collectionType
  isVariableFont
  cssUrl
  sku {
    id
  }
  bundles {
    sku {
      id
    }
  }
  fontStyles {
    name
    cssFamily
    cssWeight
    cssStyle
    webfontSources {
      url
      format
    }
    sku {
      id
    }
    variableInstances {
      name
      coordinates {
        axis
        value
      }
    }
  }
}

fragment FontDetail on FontCollection {
  ...FontDetailCollection
  shortDescription
  description
  pdfs {
    url
    thumbnailUrl
    name
  }
  featureStyle {
    cssFamily
    name
    webfontSources {
      url
      format
    }
  }
  children(collectionTypes: [FAMILY]) {
    ...FontDetailCollection
  }
  images {
    url
    description
    meta {
      mimeType
      width
      height
    }
  }
  minisiteLink
}

query Font($slug: String!) {
  viewer {
    slug(name: $slug) {
      fontCollection {
        ...FontDetail

        pageMetadata {
          title
          description
          keywords
        }
      }
    }
  }
}
