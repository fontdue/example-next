query RootLayout {
  viewer {
    url
    fontCollections(onlyRoots: true, first: 2) {
      edges {
        node {
          id
        }
      }
    }
    pages(first: 12) {
      edges {
        node {
          id
          title
          slug {
            name
          }
        }
      }
    }
    settings {
      title
      description
      footerText(format: HTML)
      htmlHead
      faviconMarkup
      uiFontStyle {
        name
        cssFamily
        webfontSources {
          url
          format
        }
      }
    }
    logo {
      url
      meta {
        width
        height
      }
    }
  }
}
